<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>กำลังใจเล็กๆ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fff7f0, #ffeef3, #eef7ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    h1 {
      font-size: 1.4rem;
      color: #444;
      margin-bottom: 18px;
    }

    p {
      color: #666;
      margin: 10px 0;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s ease;
    }

    p.show {
      opacity: 1;
      transform: translateY(0);
    }

    button {
      margin-top: 18px;
      border: none;
      background: #ff8fab;
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: scale(1.06);
      background: #ff6f91;
    }

    .heart {
      position: absolute;
      color: #ff7aa2;
      font-size: 18px;
      animation: floatUp 2.5s linear forwards;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-180px) scale(1.6);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>กดตรงนี้ ถ้าเหนื่อย</h1>

    <p id="msg1">วันนี้เก่งมากแล้วนะ</p>
    <p id="msg2">เหนื่อยก็พักได้ ไม่เป็นไรเลย</p>
    <p id="msg3">แค่อยากให้รู้ว่า มีคนเอาใจช่วยอยู่เงียบๆ</p>

    <button onclick="showMessage()">รับกำลังใจ</button>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg1").classList.add("show");

      setTimeout(() => {
        document.getElementById("msg2").classList.add("show");
      }, 700);

      setTimeout(() => {
        document.getElementById("msg3").classList.add("show");
      }, 1400);

      for (let i = 0; i < 12; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = Math.random() * window.innerHeight + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 2500);
    }
  </script>
</body>
</html>
